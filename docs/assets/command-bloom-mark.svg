<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">CommandBloom</title>
  <desc id="desc">A cursor bubble blooming into four command targets, with one liquid connection.</desc>
  <defs>
    <linearGradient id="ink" x1="42" y1="38" x2="218" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2C2140"/>
      <stop offset="0.58" stop-color="#25182F"/>
      <stop offset="1" stop-color="#17131F"/>
    </linearGradient>
    <linearGradient id="bloom" x1="128" y1="128" x2="224" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7557FF"/>
      <stop offset="1" stop-color="#D946A5"/>
    </linearGradient>
  </defs>

  <!-- The three waiting commands. -->
  <circle cx="128" cy="42" r="30" fill="url(#ink)"/>
  <circle cx="42" cy="128" r="30" fill="url(#ink)"/>
  <circle cx="128" cy="214" r="30" fill="url(#ink)"/>

  <!-- The selected command and its liquid bridge. -->
  <path d="M128 104C151 104 165 107 179 113C190 117 199 98 214 98C231 98 244 111 244 128C244 145 231 158 214 158C199 158 190 139 179 143C165 149 151 152 128 152Z" fill="url(#bloom)"/>
  <circle cx="214" cy="128" r="30" fill="url(#ink)"/>

  <!-- The pointer bubble. -->
  <circle cx="128" cy="128" r="24" fill="url(#ink)"/>
  <circle cx="128" cy="128" r="9" fill="#F8F6FC"/>

  <!-- Target glyphs stay legible at favicon size. -->
  <circle cx="128" cy="42" r="8" fill="#F8F6FC"/>
  <circle cx="42" cy="128" r="8" fill="#F8F6FC"/>
  <circle cx="128" cy="214" r="8" fill="#F8F6FC"/>
  <circle cx="214" cy="128" r="8" fill="#F8F6FC"/>
</svg>
